<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALIZE CLUB 診断システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;800;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f2b1e;
            color: #fff;
            line-height: 1.8;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        body {
            overflow-x: hidden;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        .page {
            flex: 1;
            width: 100%;
            padding: clamp(32px, 8vw, 60px) clamp(20px, 5vw, 40px);
            overflow-x: hidden;
            position: relative;
            z-index: 1;
        }

        /* ===== DARK THEME (Home) ===== */
        .page.dark-theme {
            background: transparent;
            color: #fff;
        }

        /* ===== PARCHMENT THEME (Other pages) ===== */
        .page.light-theme {
            background: #ede8df;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(184, 134, 11, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 105, 20, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(200, 180, 150, 0.05) 0%, transparent 60%);
            color: #2c2318;
        }

        .page.light-theme::before {
            background: linear-gradient(90deg, transparent 5%, #B8860B 50%, transparent 95%);
        }

        .page-content {
            max-width: 520px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes goldPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(184, 134, 11, 0.3); }
            50% { box-shadow: 0 0 24px 6px rgba(184, 134, 11, 0.0); }
        }

        @keyframes bluePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 24px 6px rgba(59, 130, 246, 0.0); }
        }

        /* ==================== GOLD TOP LINE ==================== */
        .page::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 5%, #B8860B 50%, transparent 95%);
            z-index: 100;
        }

        .cta-button {
            padding: clamp(0.9rem, 2.5vw, 1.1rem) clamp(2rem, 5vw, 3rem);
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            border: 1px solid;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            text-decoration: none;
            display: inline-block;
            max-width: 100%;
        }

        .cta-button.gold {
            background: #DAA520;
            color: #0f2b1e;
            border-color: #DAA520;
        }

        .cta-button.gold:hover {
            background: #c49a1c;
            border-color: #c49a1c;
        }

        .cta-button.blue {
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .cta-button.blue:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
        }

        .cta-button.red {
            background: #fff;
            color: #0f2b1e;
            border-color: #fff;
        }

        .cta-button.red:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 0.9);
        }

        /* ==================== DIAGNOSIS PAGE ==================== */
        .diagnosis-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .diagnosis-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            padding: clamp(2rem, 5vw, 3rem);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .back-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 0.6rem 1.2rem;
            border-radius: 24px;
            cursor: pointer;
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            margin-bottom: clamp(1.5rem, 4vw, 2rem);
            align-self: flex-start;
            letter-spacing: 0.5px;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .diagnosis-header {
            margin-bottom: clamp(2rem, 6vw, 3.5rem);
            animation: slideDown 0.5s ease;
        }

        .diagnosis-header h2 {
            font-family: 'Noto Serif JP', Georgia, serif;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            color: #fff;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: 3px;
            line-height: 1.3;
            word-break: break-word;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .diagnosis-header p {
            font-size: clamp(0.9rem, 2.5vw, 1.05rem);
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.7;
            word-break: break-word;
        }

        /* ===== STEP DOTS PROGRESS ===== */
        .step-progress {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-bottom: clamp(1.5rem, 4vw, 2rem);
        }

        .step-dot {
            width: clamp(28px, 7vw, 36px);
            height: clamp(28px, 7vw, 36px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.65rem, 1.8vw, 0.75rem);
            font-weight: 700;
            transition: all 0.3s ease;
            flex-shrink: 0;
            font-family: 'Inter', sans-serif;
        }

        .step-dot.done {
            background: #DAA520;
            color: #0f2b1e;
        }

        .step-dot.active {
            background: #fff;
            color: #0f2b1e;
            box-shadow: 0 0 0 2px rgba(218, 165, 32, 0.4);
        }

        .step-dot.upcoming {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .step-line {
            width: clamp(6px, 1.5vw, 12px);
            height: 1px;
            flex-shrink: 0;
        }

        .step-line.done { background: #DAA520; }
        .step-line.upcoming { background: rgba(255, 255, 255, 0.08); }

        /* ===== QUESTION CARD (white) ===== */
        .q-card {
            background: #fff;
            border-radius: 4px;
            padding: clamp(2rem, 6vw, 3rem);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            animation: fadeSlideUp 0.4s ease;
        }

        .q-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #DAA520;
            padding: 0;
            font-size: clamp(0.65rem, 1.8vw, 0.75rem);
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: clamp(1.2rem, 3vw, 1.8rem);
            text-transform: uppercase;
        }

        .q-number {
            color: #0f2b1e;
            font-family: 'Noto Serif JP', Georgia, serif;
            font-size: clamp(0.7rem, 1.8vw, 0.8rem);
            font-weight: 400;
            opacity: 0.3;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .q-text {
            font-family: 'Noto Serif JP', Georgia, serif;
            font-size: clamp(1.1rem, 3.8vw, 1.4rem);
            color: #0f2b1e;
            font-weight: 700;
            margin-bottom: clamp(2rem, 5vw, 2.5rem);
            line-height: 1.8;
            word-break: break-word;
            letter-spacing: 1px;
        }

        .answer-buttons {
            display: flex;
            flex-direction: column;
            gap: clamp(0.6rem, 1.5vw, 0.8rem);
        }

        .answer-button {
            display: flex;
            align-items: center;
            gap: clamp(12px, 3vw, 16px);
            padding: clamp(1rem, 3vw, 1.3rem) clamp(1.2rem, 3.5vw, 1.6rem);
            font-size: clamp(0.9rem, 2.2vw, 1rem);
            border: 1px solid;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 600;
            background-color: #fff;
            letter-spacing: 1px;
        }

        .answer-icon {
            width: clamp(28px, 7vw, 34px);
            height: clamp(28px, 7vw, 34px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            font-weight: 700;
            flex-shrink: 0;
        }

        .answer-button.yes {
            border-color: #e5e7eb;
            color: #15803d;
        }
        .answer-button.yes .answer-icon {
            background: #dcfce7;
            color: #16a34a;
        }
        .answer-button.yes:hover {
            background: #f0fdf4;
            border-color: #86efac;
        }

        .answer-button.neutral {
            border-color: #e5e7eb;
            color: #92400e;
        }
        .answer-button.neutral .answer-icon {
            background: #fef9c3;
            color: #ca8a04;
        }
        .answer-button.neutral:hover {
            background: #fefce8;
            border-color: #fde047;
        }

        .answer-button.no {
            border-color: #e5e7eb;
            color: #991b1b;
        }
        .answer-button.no .answer-icon {
            background: #fee2e2;
            color: #dc2626;
        }
        .answer-button.no:hover {
            background: #fef2f2;
            border-color: #fca5a5;
        }

        /* ==================== RESULT PAGE ==================== */
        .result-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-header {
            text-align: center;
            margin-bottom: clamp(2.5rem, 6vw, 4rem);
        }

        .result-score-display {
            width: clamp(100px, 28vw, 140px);
            height: clamp(100px, 28vw, 140px);
            border-radius: 50%;
            background: transparent;
            border: 2px solid #DAA520;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto clamp(1.5rem, 3vw, 2rem);
            font-size: clamp(2.2rem, 8vw, 3.2rem);
            font-weight: 700;
            color: #DAA520;
            font-family: 'Noto Serif JP', Georgia, serif;
            letter-spacing: 2px;
        }

        .result-rank {
            font-family: 'Noto Serif JP', Georgia, serif;
            font-size: clamp(1.1rem, 3.8vw, 1.5rem);
            color: #fff;
            font-weight: 700;
            margin-bottom: clamp(1rem, 2vw, 1.5rem);
            line-height: 1.7;
            word-break: keep-all;
            overflow-wrap: normal;
            letter-spacing: 1px;
        }

        .result-comment {
            font-size: clamp(0.85rem, 2.2vw, 0.95rem);
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: clamp(1.5rem, 3vw, 2rem);
            line-height: 2.0;
            word-break: keep-all;
            overflow-wrap: normal;
            letter-spacing: 0.5px;
        }

        .result-divider {
            width: 32px;
            height: 1px;
            background: #B8860B;
            margin: clamp(2rem, 4vw, 3rem) auto;
        }

        .category-breakdown {
            margin-bottom: clamp(2rem, 4vw, 3rem);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: clamp(1.5rem, 4vw, 2rem);
            border-radius: 4px;
        }

        .category-title {
            font-size: clamp(0.75rem, 2vw, 0.85rem);
            color: rgba(255, 255, 255, 0.45);
            font-weight: 600;
            margin-bottom: 0.6rem;
            letter-spacing: 2px;
        }

        .category-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 0;
            overflow: hidden;
        }

        .category-fill {
            height: 100%;
            background: #DAA520;
            transition: width 0.5s ease;
        }

        .cta-buttons-container {
            display: flex;
            flex-direction: column;
            gap: clamp(0.6rem, 1.5vw, 0.8rem);
            margin-bottom: clamp(2rem, 4vw, 3rem);
        }

        .result-closing {
            font-family: 'Noto Serif JP', Georgia, serif;
            font-size: clamp(0.85rem, 2.2vw, 0.95rem);
            color: rgba(255, 255, 255, 0.45);
            text-align: center;
            line-height: 2.0;
            word-break: break-word;
            font-weight: 400;
            margin-top: clamp(1.5rem, 3vw, 2rem);
            letter-spacing: 1px;
        }

        /* ==================== INTRO PAGE ==================== */
        .intro-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
        }

        .intro-header {
            text-align: center;
            margin-bottom: clamp(3rem, 8vw, 4.5rem);
        }

        .intro-logo {
            font-family: 'Noto Serif JP', Georgia, serif;
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: 700;
            letter-spacing: 6px;
            color: #DAA520;
            margin-bottom: clamp(1.5rem, 3vw, 2rem);
            text-transform: uppercase;
        }

        .intro-logo::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, #B8860B, #DAA520, #B8860B);
            margin: 1rem auto 0;
        }

        .intro-main-message {
            font-family: 'Noto Serif JP', Georgia, serif;
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            font-weight: 700;
            color: #fff;
            margin-bottom: clamp(1rem, 2vw, 1.5rem);
            line-height: 1.3;
            word-break: break-word;
            letter-spacing: 2px;
        }

        .intro-sub-message {
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.6;
            word-break: break-word;
        }

        .intro-feature-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: clamp(1rem, 2.5vw, 1.5rem);
            margin-bottom: clamp(3rem, 8vw, 4rem);
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: clamp(1.2rem, 3vw, 1.5rem);
            border-radius: 2px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(184, 134, 11, 0.2);
        }

        .feature-icon {
            font-size: clamp(1.8rem, 5vw, 2.2rem);
            margin-bottom: 0.8rem;
        }

        .feature-title {
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            word-break: break-word;
            letter-spacing: 2px;
        }

        .intro-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: clamp(2rem, 5vw, 2.5rem);
            border-radius: 4px;
            margin-bottom: clamp(2rem, 5vw, 2.5rem);
        }

        .intro-section h3 {
            font-family: 'Noto Serif JP', Georgia, serif;
            font-size: clamp(1.1rem, 3.5vw, 1.3rem);
            color: #fff;
            margin-bottom: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            letter-spacing: 3px;
            word-break: break-word;
        }

        .step-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: clamp(1.5rem, 3vw, 2rem);
        }

        .step-item {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .step-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #DAA520;
            font-family: 'Noto Serif JP', Georgia, serif;
            letter-spacing: 1px;
        }

        .step-title {
            font-size: 1rem;
            color: #fff;
            font-weight: 700;
            word-break: break-word;
        }

        .step-description {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.45);
            line-height: 1.5;
            word-break: break-word;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .form-label {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .form-input,
        .form-textarea {
            padding: 0.9rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 2px;
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #DAA520;
            background: rgba(255, 255, 255, 0.04);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
            font-size: 0.95rem;
        }

        .form-submit {
            padding: clamp(1rem, 2.5vw, 1.3rem) 2rem;
            background: transparent;
            color: rgba(239, 68, 68, 0.9);
            border: 2px solid rgba(239, 68, 68, 0.5);
            border-radius: 6px;
            font-size: clamp(1rem, 2vw, 1.1rem);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-submit:hover:not(:disabled) {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 1);
            color: #fff;
            transform: translateY(-2px);
        }

        .form-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ==================== LIGHT THEME OVERRIDES ==================== */
        .light-theme .back-button {
            background: rgba(44, 35, 24, 0.06);
            border-color: rgba(44, 35, 24, 0.12);
            color: #8b7355;
        }
        .light-theme .back-button:hover {
            background: rgba(44, 35, 24, 0.1);
            color: #2c2318;
        }

        /* Step dots on light theme */
        .light-theme .step-dot.done { background: #B8860B; color: #fff; }
        .light-theme .step-dot.active { background: #2c2318; color: #fff; box-shadow: 0 0 0 2px rgba(184,134,11,0.4); }
        .light-theme .step-dot.upcoming { background: rgba(44,35,24,0.08); color: rgba(44,35,24,0.25); border-color: rgba(44,35,24,0.1); }
        .light-theme .step-line.done { background: #B8860B; }
        .light-theme .step-line.upcoming { background: rgba(44,35,24,0.1); }

        /* Result page on light theme */
        .light-theme .result-score-display {
            border-color: #B8860B;
            color: #B8860B;
            background: rgba(184,134,11,0.05);
        }
        .light-theme .result-rank {
            color: #2c2318;
        }
        .light-theme .result-comment {
            color: #6b5d4f;
        }
        .light-theme .result-divider {
            background: #B8860B;
        }
        .light-theme .result-closing {
            color: #8b7355;
        }

        /* Diagnosis card on light */
        .light-theme .diagnosis-card {
            background: #fff;
            border-color: rgba(44,35,24,0.08);
            box-shadow: 0 2px 12px rgba(44,35,24,0.06);
        }

        /* Category accordion on light */
        .light-theme .cat-card {
            background: #fff;
            border-color: rgba(44,35,24,0.08);
        }
        .light-theme .cat-card:hover {
            border-color: rgba(184,134,11,0.2);
        }

        /* CTA buttons on light */
        .light-theme .cta-button.gold {
            background: #B8860B;
            color: #fff;
            border-color: #B8860B;
        }
        .light-theme .cta-button.gold:hover {
            background: #9a7209;
        }
        .light-theme .cta-button.red {
            background: #2c2318;
            color: #fff;
            border-color: #2c2318;
        }
        .light-theme .cta-button.red:hover {
            background: #3d3024;
        }
        .light-theme .cta-button.blue {
            background: transparent;
            color: #8b7355;
            border-color: rgba(44,35,24,0.2);
        }
        .light-theme .cta-button.blue:hover {
            background: rgba(44,35,24,0.05);
            color: #2c2318;
            border-color: rgba(44,35,24,0.4);
        }

        /* Feature cards / Intro on light */
        .light-theme .feature-card {
            background: #fff;
            border-color: rgba(44,35,24,0.08);
        }
        .light-theme .feature-card:hover {
            border-color: rgba(184,134,11,0.3);
        }
        .light-theme .feature-title {
            color: #2c2318;
        }
        .light-theme .intro-section {
            background: #fff;
            border-color: rgba(44,35,24,0.08);
        }
        .light-theme .intro-section h3 {
            color: #2c2318;
        }
        .light-theme .intro-header .intro-logo {
            color: #B8860B;
        }
        .light-theme .intro-header .intro-main-message {
            color: #2c2318;
        }
        .light-theme .intro-header .intro-sub-message {
            color: #8b7355;
        }
        .light-theme .step-item {
            background: #fff;
            border-color: rgba(44,35,24,0.06);
        }
        .light-theme .step-number { color: #B8860B; }
        .light-theme .step-title { color: #2c2318; }
        .light-theme .step-description { color: #8b7355; }

        /* Form on light */
        .light-theme .form-label { color: #6b5d4f; }
        .light-theme .form-input,
        .light-theme .form-textarea {
            background: #fff;
            border-color: rgba(44,35,24,0.12);
            color: #2c2318;
        }
        .light-theme .form-input::placeholder,
        .light-theme .form-textarea::placeholder {
            color: rgba(44,35,24,0.3);
        }
        .light-theme .form-input:focus,
        .light-theme .form-textarea:focus {
            border-color: #B8860B;
            background: #fff;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 600px) {
            .diagnosis-cards {
                grid-template-columns: 1fr;
            }

            .home-title {
                word-break: break-word;
            }

            .top-title {
                word-break: break-word;
            }

            .cta-buttons-container {
                align-items: stretch;
            }

            .cta-button {
                width: 100%;
                text-align: center;
            }

            .step-list {
                grid-template-columns: 1fr;
            }

            .step-dot {
                width: 24px;
                height: 24px;
                font-size: 0.6rem;
            }

            .step-line {
                width: 4px;
            }
        }
    </style>
</head>

                            } }, '36〜48万円')
                        ),
                        S('div', { key: 'sn3', style: { textAlign: 'center', marginTop: '0.8rem', fontSize: bodySize, color: '#fff', fontWeight: 700 } },
                            '給料を上げずに実質賃金が上がる')
                    ]),

                    /* ===== Section 10: 料金 ===== */
                    sec([
                        S('div', { key: 'pr0', style: { textAlign: 'center', fontSize: 'clamp(10px, 2.2vw, 11px)', letterSpacing: 5, color: 'rgba(218,165,32,0.7)', marginBottom: 8 } }, '圧倒的コストパフォーマンス'),
                        sH('料金'),
                        S('div', { key: 'pr2', style: {
                            maxWidth: 420, margin: '0 auto', border: cardBorder,
                            padding: 'clamp(16px, 4vw, 24px)', textAlign: 'center'
                        } },
                            S('div', { style: { marginBottom: 12 } },
                                S('span', { style: { color: subColor, fontSize: 'clamp(0.75rem, 2vw, 0.82rem)' } }, '入会金：'),
                                S('span', { style: { color: '#fff', fontWeight: 700, fontSize: 'clamp(0.9rem, 2.5vw, 1rem)' } }, '5万円'),
                                S('span', { style: { color: subColor, fontSize: 'clamp(0.7rem, 1.8vw, 0.78rem)' } }, '（社員50名まで）')
                            ),
                            S('div', { style: { marginBottom: 12 } },
                                S('span', { style: { color: subColor, fontSize: 'clamp(0.75rem, 2vw, 0.82rem)' } }, '月額：'),
                                S('span', { style: { color: '#DAA520', fontWeight: 700, fontSize: 'clamp(1.1rem, 3vw, 1.3rem)' } }, '3万円'),
                                S('span', { style: { color: subColor, fontSize: 'clamp(0.7rem, 1.8vw, 0.78rem)' } }, '（社員50名まで）')
                            ),
                            S('div', { style: { color: subColor, fontSize: 'clamp(0.72rem, 1.8vw, 0.78rem)' } }, '社員1人あたり 約600円')
                        ),
                        S('div', { key: 'pr3', style: { textAlign: 'center', marginTop: '1.2rem' } },
                            S('span', { style: { padding: '8px 20px', border: '1px solid rgba(218,165,32,0.3)', display: 'inline-block' } },
                                S('div', { style: { fontSize: bodySize, color: '#DAA520', fontWeight: 700 } }, 'いつでも解約可'),
                                S('div', { style: { fontSize: 'clamp(0.68rem, 1.6vw, 0.72rem)', color: subColor, marginTop: 4 } }, 'それくらい自信があります。')
                            )
                        ),
                        S('div', { key: 'pr4', style: {
                            textAlign: 'center', marginTop: '1.5rem', fontSize: 'clamp(0.88rem, 2.5vw, 1rem)',
                            fontFamily: "'Noto Serif JP', Georgia, serif", fontWeight: 700, letterSpacing: 1,
                            whiteSpace: 'pre-line', lineHeight: 1.8
                        } }, 'コーヒー1杯分の値段で\n社員の人生不安を解消します。')
                    ]),

                    /* ===== Section 11: 導入フロー ===== */
                    sec([
                        sH('導入フロー'),
                        S('div', { key: 'fl1', style: {
                            display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 'clamp(8px, 2vw, 14px)',
                            maxWidth: 600, margin: '0 auto'
                        } },
                            [
                                { step: '1', name: '無料説明会', icon: '🎓' },
                                { step: '2', name: '入会手続き', icon: '📝' },
                                { step: '3', name: 'システム登録', icon: '🔐' },
                                { step: '4', name: '利用開始', icon: '✅' }
                            ].map(function(s, i) {
                                return S('div', { key: i, style: {
                                    textAlign: 'center', padding: 'clamp(18px, 4vw, 30px) 8px',
                                    background: cardBg, border: cardBorder
                                } },
                                    S('div', { style: { fontSize: 'clamp(10px, 2.5vw, 12px)', color: '#DAA520', letterSpacing: 2, marginBottom: 8 } }, 'STEP' + s.step),
                                    S('div', { style: { fontSize: 'clamp(1.8rem, 6vw, 2.5rem)', marginBottom: 8 } }, s.icon),
                                    S('div', { style: { fontSize: 'clamp(0.8rem, 2.5vw, 0.95rem)', fontWeight: 600, letterSpacing: 0.5 } }, s.name)
                                );
                            })
                        ),
                        S('div', { key: 'fl2', style: { textAlign: 'center', marginTop: '1.2rem', fontSize: bodySize, color: '#DAA520', fontWeight: 600 } },
                            'すぐに価値提供が始まる')
                    ]),

                    /* ===== Section 12: Vision ===== */
                    S('div', { style: {
                        padding: 'clamp(3rem, 8vw, 5rem) clamp(1.5rem, 5vw, 3rem)',
                        textAlign: 'center'
                    } },
                        S('div', { style: {
                            fontSize: 'clamp(0.88rem, 2.5vw, 1rem)', color: bodyColor,
                            lineHeight: 2.4, fontFamily: "'Noto Serif JP', Georgia, serif",
                            whiteSpace: 'pre-line', marginBottom: '1.5rem'
                        } }, '社員の人生が整えば\n家庭が整う\n家庭が整えば\n子どもが救われる'),
                        S('div', { style: {
                            fontSize: 'clamp(1.1rem, 3.5vw, 1.4rem)', color: '#DAA520',
                            fontWeight: 700, fontFamily: "'Noto Serif JP', Georgia, serif", letterSpacing: 3
                        } }, '会社が社会を変える時代へ')
                    ),

                    /* ===== Contact Form ===== */
                    S('div', { id: 'intro-contact', style: {
                        padding: 'clamp(2.5rem, 6vw, 4rem) clamp(1.5rem, 5vw, 3rem)'
                    } },
                        sH('お問い合わせ'),
                        S('div', { style: { textAlign: 'center', marginBottom: '1.5rem', fontSize: bodySize, color: bodyColor } },
                            '導入に関するご質問やご相談はお気軽にどうぞ。'
                        ),
                        S('form', { className: 'contact-form', onSubmit: handleFormSubmit, style: { maxWidth: 600, margin: '0 auto' } },
                            S('div', { className: 'form-group' },
                                S('label', { className: 'form-label', style: { color: 'rgba(255,255,255,0.7)' } }, 'お名前 *'),
                                S('input', { type: 'text', className: 'form-input', required: true, value: formData.name,
                                    style: { background: 'rgba(255,255,255,0.08)', border: cardBorder, color: '#fff' },
                                    onChange: function(e) { handleFormChange('name', e.target.value); } })
                            ),
                            S('div', { className: 'form-group' },
                                S('label', { className: 'form-label', style: { color: 'rgba(255,255,255,0.7)' } }, '会社名'),
                                S('input', { type: 'text', className: 'form-input', value: formData.company,
                                    style: { background: 'rgba(255,255,255,0.08)', border: cardBorder, color: '#fff' },
                                    onChange: function(e) { handleFormChange('company', e.target.value); } })
                            ),
                            S('div', { className: 'form-group' },
                                S('label', { className: 'form-label', style: { color: 'rgba(255,255,255,0.7)' } }, '所在地'),
                                S('input', { type: 'text', className: 'form-input', value: formData.address,
                                    style: { background: 'rgba(255,255,255,0.08)', border: cardBorder, color: '#fff' },
                                    onChange: function(e) { handleFormChange('address', e.target.value); } })
                            ),
                            S('div', { className: 'form-group' },
                                S('label', { className: 'form-label', style: { color: 'rgba(255,255,255,0.7)' } }, '電話番号 *'),
                                S('input', { type: 'tel', className: 'form-input', required: true, value: formData.phone,
                                    style: { background: 'rgba(255,255,255,0.08)', border: cardBorder, color: '#fff' },
                                    onChange: function(e) { handleFormChange('phone', e.target.value); } })
                            ),
                            S('div', { className: 'form-group' },
                                S('label', { className: 'form-label', style: { color: 'rgba(255,255,255,0.7)' } }, 'メールアドレス *'),
                                S('input', { type: 'email', className: 'form-input', required: true, value: formData.email,
                                    style: { background: 'rgba(255,255,255,0.08)', border: cardBorder, color: '#fff' },
                                    onChange: function(e) { handleFormChange('email', e.target.value); } })
                            ),
                            S('div', { className: 'form-group' },
                                S('label', { className: 'form-label', style: { color: 'rgba(255,255,255,0.7)' } }, 'メッセージ'),
                                S('textarea', { className: 'form-textarea', value: formData.message,
                                    style: { background: 'rgba(255,255,255,0.08)', border: cardBorder, color: '#fff' },
                                    onChange: function(e) { handleFormChange('message', e.target.value); } })
                            ),
                            S('button', { type: 'submit', className: 'form-submit', disabled: isSubmitting,
                                style: { background: '#DAA520', color: '#fff', border: 'none', fontWeight: 700 }
                            }, isSubmitting ? '送信中...' : '送信する')
                        )
                    ),

                    /* ===== Footer ===== */
                    S('div', { style: {
                        color: 'rgba(255,255,255,0.35)', padding: 'clamp(1.5rem, 4vw, 2rem)',
                        textAlign: 'center', fontSize: 'clamp(0.65rem, 1.6vw, 0.72rem)', letterSpacing: 1
                    } },
                        S('div', { style: { marginBottom: 4 } }, '日本リアライズ株式会社'),
                        S('div', null, 'https://n-realize.co.jp/')
                    )
                )
            );
        }

        function App() {
            var pageState = useState('home');
            var page = pageState[0];
            var rawSetPage = pageState[1];
            var setPage = function(p) { rawSetPage(p); window.scrollTo(0, 0); };

            var diagTypeState = useState('company');
            var diagType = diagTypeState[0];
            var setDiagType = diagTypeState[1];

            var currentQuestionState = useState(0);
            var currentQuestion = currentQuestionState[0];
            var setCurrentQuestion = currentQuestionState[1];

            var answersState = useState([]);
            var answers = answersState[0];
            var setAnswers = answersState[1];

            var pageProps = {
                page: page, setPage: setPage,
                diagType: diagType, setDiagType: setDiagType,
                currentQuestion: currentQuestion, setCurrentQuestion: setCurrentQuestion,
                answers: answers, setAnswers: setAnswers
            };

            return S('div', { className: 'app-container' },
                page === 'home' && S('img', { src: IMG_COMPASS, alt: '', style: { position: 'fixed', top: '-10%', left: '50%', transform: 'translateX(-50%)', width: '250vw', maxWidth: 2000, opacity: 0.22, pointerEvents: 'none', zIndex: 0 } }),
                S('div', { style: { position: 'relative', zIndex: 1, flex: 1, display: 'flex', flexDirection: 'column' } },
                    page === 'home' && S(HomePage, pageProps),
                    page === 'top' && S(TopPage, pageProps),
                    page === 'diagnosis' && S(DiagnosisPage, pageProps),
                    page === 'result' && S(ResultPage, pageProps),
                    page === 'intro' && S(IntroPage, pageProps)
                )
            );
        }

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(S(App, null));
    </script>
</body>
</html>
